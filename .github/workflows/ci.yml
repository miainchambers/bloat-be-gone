name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ShellCheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          shellcheck bloat-be-gone.sh
          shellcheck install.sh
          shellcheck update.sh
          shellcheck uninstall.sh
          shellcheck bin/bgb
          shellcheck hooks/pre-commit
          shellcheck hooks/pre-push
          shellcheck hooks/install.sh

  test:
    name: Tests (BATS) on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install BATS (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y bats

      - name: Install BATS (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install bats-core

      - name: Make scripts executable
        run: chmod +x bloat-be-gone.sh bin/bgb install.sh update.sh uninstall.sh

      - name: Install binaries to PATH for bgb tests
        run: |
          mkdir -p "$HOME/.local/bin"
          cp bloat-be-gone.sh "$HOME/.local/bin/bloat-be-gone"
          cp bin/bgb "$HOME/.local/bin/bgb"
          chmod +x "$HOME/.local/bin/bloat-be-gone" "$HOME/.local/bin/bgb"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run tests
        run: bats tests/

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
