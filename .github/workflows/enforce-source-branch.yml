name: Enforce source branch

on:
  pull_request:
    branches: [main]

jobs:
  check-source-branch:
    name: Source branch must be dev
    runs-on: ubuntu-latest
    steps:
      - name: Check source branch
        run: |
          if [ "${{ github.head_ref }}" != "dev" ]; then
            echo "❌ PRs to main must come from the 'dev' branch."
            echo "   Source branch was: ${{ github.head_ref }}"
            exit 1
          fi
          echo "✅ Source branch is dev"
