name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@7987652d64b4581673a76e33ad5e98e3dd56832f # v4.1.3
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  update-homebrew-tap:
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    steps:
      - name: Get release info
        id: info
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          TARBALL_URL="https://github.com/miainchambers/bloat-be-gone/archive/refs/tags/${TAG}.tar.gz"
          SHA256=$(curl -fsSL "$TARBALL_URL" | sha256sum | cut -d' ' -f1)
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256"   >> "$GITHUB_OUTPUT"
          echo "url=$TARBALL_URL" >> "$GITHUB_OUTPUT"

      - name: Checkout tap repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: miainchambers/homebrew-bloat-be-gone
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: tap

      - name: Update formula
        run: |
          sed -i "s|url \".*\"|url \"${{ steps.info.outputs.url }}\"|"         tap/Formula/bloat-be-gone.rb
          sed -i "s|sha256 \".*\"|sha256 \"${{ steps.info.outputs.sha256 }}\"|" tap/Formula/bloat-be-gone.rb

      - name: Commit and push
        run: |
          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/bloat-be-gone.rb
          git commit -m "chore: update formula to ${{ steps.info.outputs.tag }}"
          git push
